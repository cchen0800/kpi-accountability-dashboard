name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 34.28.172.64
          username: chris
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/chris/kpi-accountability-dashboard
            git pull origin main
            docker compose down
            docker volume rm kpi-accountability-dashboard_static_dist 2>/dev/null || true
            docker compose up -d --build
